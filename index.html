<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Our List</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0d;
  --card: #1a1916;
  --border: #2e2c28;
  --text: #f0ede6;
  --muted: #7a776e;
  --tag-bg: #252320;
  --accent: #e8b84b;

  /* Category colours */
  --c-food:        #e8b84b;
  --c-italian:     #e07b4a;
  --c-asian:       #e84b7a;
  --c-latino:      #4be87a;
  --c-american:    #4b9ee8;
  --c-brunch:      #b44be8;
  --c-fusion:      #e8d44b;
  --c-bars:        #4be8d4;
  --c-coffee:      #c8885a;
  --c-dessert:     #e84bb4;
  --c-carts:       #88c84b;
  --c-finedining:  #c8b8f8;
  --c-activities:  #4bd4e8;
  --c-hikes:       #6be84b;
  --c-getaways:    #e84b4b;
  --c-shopping:    #f8a84b;
  --c-international: #a84be8;
  --c-seafood:     #4b9ee8;
  --c-greek:       #e8e04b;
  --c-african:     #e8784b;
  --c-other:       #888888;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }

/* HEADER */
header {
  border-bottom: 1px solid var(--border);
  padding: 20px 20px 14px;
  display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap;
}
header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.6rem; letter-spacing: 3px; color: var(--accent); line-height: 1; }
header .sub { color: var(--muted); font-size: 0.76rem; letter-spacing: 1.5px; text-transform: uppercase; padding-bottom: 4px; }

/* STICKY BAR */
#stickyBar { position: sticky; top: 0; z-index: 20; background: var(--bg); }

#favBar {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 14px;
  font-size: 0.74rem; color: var(--muted);
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  white-space: nowrap;
  transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
  max-height: 50px; opacity: 1;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#favBar::-webkit-scrollbar { display: none; }
#favBar.gone { max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0; border-bottom-color: transparent; }
#favBar > * { flex-shrink: 0; }

#topRow {
  transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
  display: flex; gap: 8px; align-items: center;
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
#topRow::-webkit-scrollbar { display: none; }
#topRow.gone { max-height: 0 !important; padding: 0 !important; opacity: 0; pointer-events: none; overflow: hidden; }
#topRow > * { flex-shrink: 0; }
.search-wrap { flex: 1; min-width: 120px; flex-shrink: 1 !important; }

/* CATEGORY FILTER ROW */
#catRow {
  display: flex; gap: 6px; align-items: center;
  padding: 0 14px 8px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  transition: max-height 0.3s ease, opacity 0.26s ease, padding 0.3s ease;
  max-height: 60px; opacity: 1; white-space: nowrap;
}
#catRow::-webkit-scrollbar { display: none; }
#catRow.gone { max-height: 0 !important; padding: 0 !important; opacity: 0; pointer-events: none; overflow: hidden; }

/* DROPDOWN MENUS for sub-category and type filter */
.cat-dropdown-wrap {
  position: relative; display: inline-block;
}
.cat-dropdown-menu {
  display: none;
  position: absolute; top: calc(100% + 6px); left: 0;
  background: #1a1916; border: 1px solid var(--border);
  border-radius: 10px; z-index: 50;
  min-width: 200px; max-height: 320px; overflow-y: auto;
  box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  padding: 6px;
}
.cat-dropdown-menu::-webkit-scrollbar { display: none; }
.cat-dropdown-menu.open { display: block; }
.cat-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 7px;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem; color: var(--text); font-weight: 300;
  transition: background 0.12s; white-space: nowrap;
}
.cat-dropdown-item:hover { background: #252320; }
.cat-dropdown-item.active { background: #252320; font-weight: 500; }
.cat-dropdown-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cat-dropdown-item .check { margin-left: auto; font-size: 0.8rem; color: var(--accent); }

/* type filter dropdown */
#typeDropdownWrap { position: relative; display: inline-block; }
#typeDropdownMenu {
  display: none;
  position: absolute; top: calc(100% + 6px); left: 0;
  background: #1a1916; border: 1px solid var(--border);
  border-radius: 10px; z-index: 50;
  min-width: 180px; max-height: 280px; overflow-y: auto;
  box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  scrollbar-width: none; padding: 6px;
}
#typeDropdownMenu::-webkit-scrollbar { display: none; }
#typeDropdownMenu.open { display: block; }

/* subCatRow hidden - replaced by dropdown */
#subCatRow { display: none; }
#filterRow { display: none; }
#typeRow.gone { max-height: 0; padding-bottom: 0; opacity: 0; pointer-events: none; overflow: hidden; }

/* TYPE + STAR ROW */
#filterRow {
  display: flex; flex-wrap: nowrap; gap: 6px;
  padding: 0 14px 8px;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
  transition: max-height 0.3s ease, opacity 0.26s ease, padding 0.3s ease;
  max-height: 0; opacity: 0; pointer-events: none;
}
#filterRow::-webkit-scrollbar { display: none; }
#filterRow.visible { max-height: 48px; opacity: 1; pointer-events: auto; }
#filterRow.gone { max-height: 0; padding-bottom: 0; opacity: 0; pointer-events: none; }

#starRow {
  display: flex; gap: 6px; align-items: center;
  padding: 0 20px 8px;
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.26s ease, padding 0.3s ease;
  max-height: 56px; opacity: 1;
}
#starRow.gone { max-height: 0; padding-bottom: 0; opacity: 0; pointer-events: none; }

#stickyBorder { border-bottom: 1px solid var(--border); }

/* PILLS */
.cat-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--tag-bg); border: 2px solid transparent;
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.4px; padding: 5px 12px; border-radius: 20px;
  cursor: pointer; transition: all 0.14s; white-space: nowrap; text-transform: uppercase;
  color: var(--muted); flex-shrink: 0;
}
.cat-pill:hover { color: var(--text); }
.cat-pill.active { color: #0f0e0d; font-weight: 600; }
.cat-pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.pill {
  background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
  letter-spacing: 0.4px; padding: 4px 10px; border-radius: 20px;
  cursor: pointer; transition: all 0.14s; white-space: nowrap; text-transform: uppercase;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #0f0e0d; }

.star-pill {
  background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
  padding: 4px 10px; border-radius: 20px; cursor: pointer; transition: all 0.14s; white-space: nowrap;
}
.star-pill:hover { border-color: var(--accent); color: var(--accent); }
.star-pill.active { background: #2a2000; border-color: var(--accent); color: var(--accent); }

.toggle-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
  letter-spacing: 0.4px; padding: 4px 10px; border-radius: 20px;
  cursor: pointer; transition: all 0.14s; text-transform: uppercase; white-space: nowrap;
}
.toggle-btn:hover { border-color: #4caf78; color: #4caf78; }
.toggle-btn.active-fav { background: #e84b4b22; border-color: #e84b4b; color: #e87a7a; }
.toggle-btn.active-been { background: #0f231822; border-color: #2a6644; color: #4caf78; }

/* INPUTS */
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
input[type="text"] {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 300;
  padding: 9px 10px 9px 32px; border-radius: 6px; outline: none; transition: border-color 0.18s;
}
input[type="text"]:focus { border-color: var(--accent); }
input[type="text"]::placeholder { color: var(--muted); }
.modal input[type="text"], .modal input[type="url"] { padding: 9px 11px; width: 100%; max-width: 100%; box-sizing: border-box; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
select {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
  padding: 8px 10px; border-radius: 6px; outline: none; cursor: pointer;
}
.add-btn {
  background: none; border: 1px dashed var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.74rem;
  padding: 7px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); }

/* RANDOM BUTTON */
.random-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.74rem; font-weight: 500;
  padding: 7px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; letter-spacing: 0.3px;
}
.random-btn:hover { border-color: var(--accent); color: var(--accent); }

/* COUNT BAR */
#countBar { padding: 8px 20px 2px; color: var(--muted); font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; }

/* GRID */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; padding: 10px 20px 60px; }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
  position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  transform: scaleX(1); transform-origin: left;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.4); border-color: #3e3b34; }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.card-name { font-size: 0.96rem; font-weight: 500; color: var(--text); line-height: 1.3; flex: 1; padding-right: 6px; }
.card-actions { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px 3px; line-height: 1; font-size: 0.85rem; transition: opacity 0.14s; opacity: 0.4; }
.icon-btn:hover { opacity: 1; }

.card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.card-location { font-size: 0.72rem; color: var(--muted); }
.card-note { font-size: 0.74rem; color: var(--muted); margin-bottom: 8px; font-style: italic; }

.card-footer { display: flex; justify-content: space-between; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-stars { display: flex; gap: 2px; }
.card-stars .s { font-size: 0.85rem; cursor: pointer; color: #3a3730; transition: color 0.1s; line-height: 1; }
.card-stars .s.lit { color: var(--accent); }

.card-badges { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.ctag {
  font-size: 0.64rem; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px;
  background: var(--tag-bg); border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: background 0.14s; white-space: nowrap;
}
.ctag:hover { border-color: var(--accent); color: var(--accent); }
.been-btn {
  font-size: 0.64rem; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 3px; cursor: pointer; white-space: nowrap;
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; transition: all 0.14s;
}
.been-btn.on { background: #0f2318; border-color: #2a6644; color: #4caf78; }
.been-btn:hover { border-color: #4caf78; color: #4caf78; }

.goback-btn {
  font-size: 0.78rem; font-weight: 600;
  width: 24px; height: 24px; border-radius: 4px; cursor: pointer; white-space: nowrap;
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; transition: all 0.14s;
  display: inline-flex; align-items: center; justify-content: center;
}
.goback-btn.yes { background: #0d1e2e; border-color: #2a5a8a; color: #4a9ee8; }
.goback-btn.no  { background: #2a0f0f; border-color: #8a2a2a; color: #e87a4a; }
.goback-btn:hover { opacity: 0.8; }
/* Show been decision label */
.been-decision {
  font-size: 0.62rem; color: var(--muted); letter-spacing: 0.3px;
  text-transform: uppercase; align-self: center;
}

.link-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 4px;
  background: none; border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all 0.14s; text-decoration: none; font-size: 0.82rem;
  flex-shrink: 0;
}
.link-btn:hover { border-color: var(--accent); color: var(--accent); background: #1e1c18; }

/* card photo */
.card-photo {
  width: 100%; height: 120px; object-fit: cover; object-position: center center;
  border-radius: 5px; margin-bottom: 8px; display: block;
}

/* want-to-go fire button */
.want-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1rem; padding: 2px 3px; line-height: 1;
  opacity: 0.25; transition: opacity 0.14s, transform 0.14s;
}
.want-btn.on { opacity: 1; transform: scale(1.15); }
.want-btn:hover { opacity: 0.8; }

/* collection tags */
.coll-tag {
  font-size: 0.62rem; font-weight: 500; letter-spacing: 0.3px;
  padding: 2px 6px; border-radius: 10px;
  background: #1e1c18; border: 1px solid #3a3520;
  color: #a09060; white-space: nowrap;
}

/* bigger card note */
.card-note {
  font-size: 0.84rem !important;
  color: var(--text) !important;
  opacity: 0.75;
  font-style: normal !important;
  margin-bottom: 9px;
  line-height: 1.4;
}
.fav-btn-card { font-size: 1rem; opacity: 0.3; transition: opacity 0.14s; background: none; border: none; cursor: pointer; line-height: 1; }
.fav-btn-card.on { opacity: 1; color: #e84b4b; }

.empty { grid-column: 1/-1; text-align: center; padding: 50px 20px; color: var(--muted); font-size: 0.88rem; }

/* VIEW TABS */
.view-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  padding: 0 14px; background: var(--bg);
}
.view-tab {
  padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
  font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--muted); cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent; transition: all 0.14s; white-space: nowrap;
}
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
#viewTabs { transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease; }
#viewTabs.gone { max-height: 0 !important; padding: 0 !important; opacity: 0; pointer-events: none; overflow: hidden; border-bottom: none !important; }
.view-tab:hover { color: var(--text); }

/* archived card dim */
.card.archived { opacity: 0.6; }
.card.archived:hover { opacity: 1; }
.archive-badge {
  font-size: 0.62rem; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; background: #2a2010; border: 1px solid #4a3820;
  color: #a07840; white-space: nowrap;
}
.repeat-badge {
  font-size: 0.62rem; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase;
  padding: 2px 6px; border-radius: 3px; background: #0d1e2e; border: 1px solid #2a5a8a;
  color: #4a9ee8; white-space: nowrap;
}

/* MAP VIEW */
#mapView {
  display: none; position: fixed; inset: 0; z-index: 150;
  background: var(--bg); flex-direction: column;
}
#mapView.open { display: flex; }
#mapContainer { flex: 1; width: 100%; }
#mapHeader {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--card);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#mapHeader h2 {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
  letter-spacing: 2px; color: var(--accent); flex: 1;
}
.map-close-btn {
  background: var(--tag-bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; padding: 7px 14px; border-radius: 6px;
  cursor: pointer;
}
#mapSpotList {
  max-height: 38vh; overflow-y: auto;
  background: var(--bg); border-top: 1px solid var(--border);
  flex-shrink: 0; scrollbar-width: none;
}
#mapSpotList::-webkit-scrollbar { display: none; }
.map-spot-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s;
}
.map-spot-item:hover { background: var(--card); }
.map-spot-item .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.map-spot-item .spot-name { font-size: 0.88rem; font-weight: 500; flex: 1; }
.map-spot-item .spot-loc { font-size: 0.74rem; color: var(--muted); }

.map-btn {
  background: none; border: 1px solid var(--border); color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.74rem; font-weight: 500;
  padding: 7px 12px; border-radius: 6px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
}
.map-btn:hover { border-color: var(--accent); color: var(--accent); }

#photoUploadBtn:hover { border-color: var(--accent); color: var(--accent); }
#photoUploadBtn.uploading { opacity: 0.5; pointer-events: none; }

/* RANDOM OVERLAY */
.rand-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 200;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 20px; padding: 30px;
}
.rand-overlay.open { display: flex; }
.rand-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 28px 24px;
  width: 100%; max-width: 380px; text-align: center;
  position: relative; overflow: hidden;
}
.rand-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
}
.rand-cat { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px; }
.rand-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; color: var(--text); line-height: 1.1; margin-bottom: 8px; }
.rand-note { font-size: 0.82rem; color: var(--muted); font-style: italic; margin-bottom: 6px; }
.rand-loc { font-size: 0.78rem; color: var(--muted); }
.rand-btns { display: flex; gap: 10px; width: 100%; max-width: 380px; }
.rand-btn { flex: 1; padding: 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.86rem; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.14s; }
.rand-btn:hover { opacity: 0.82; }
.rand-shuffle { background: var(--accent); color: #0f0e0d; }
.rand-close { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
.rand-spinning .rand-name { opacity: 0.3; transform: scale(0.95); transition: all 0.1s; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px 14px 0 0; padding: 18px 18px env(safe-area-inset-bottom, 28px);
  width: 100vw; max-width: 100vw; max-height: 90dvh; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; box-sizing: border-box;
}
.modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 14px; }

.field { margin-bottom: 11px; }
.field label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
.star-picker { display: flex; gap: 8px; margin-top: 3px; }
.star-picker .sp { font-size: 1.5rem; cursor: pointer; color: #3a3730; transition: color 0.1s; line-height: 1; }
.star-picker .sp.lit { color: var(--accent); }
.modal-btns { display: flex; gap: 9px; margin-top: 16px; padding-bottom: 8px; }

.btn-danger { background: #3a1a15; color: #e87a7a; border: 1px solid #5a2a20; }
.btn-secondary { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
.btn:hover { opacity: 0.82; }

/* autocomplete */
.ac-wrap { position: relative; }
.ac-list {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;

  max-height: 220px; overflow-y: scroll; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain; touch-action: pan-y;
}
.ac-list.open { display: block; }
.ac-item { padding: 10px 14px; font-size: 0.88rem; color: var(--text); cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.12s; }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.highlighted { background: #2a2820; color: var(--accent); }

@media (max-width: 600px) {

/* Prevent iOS auto-zoom - inputs must be >= 16px */
.modal input, .modal textarea, .modal select,
.field input, .field textarea, .field select {
  font-size: 16px !important;
}
</style>

const LOCATION_OPTS = [

async function sbFetch(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function loadCustomCats() {
  try {
    const saved = localStorage.getItem('our-list-cats');
    if (!saved) return;
    JSON.parse(saved).forEach(c => {
      if (!CAT_MAP[c.key]) { CATS.push(c); FOOD_SUBS.push(c.key); CAT_MAP[c.key] = c; }
    });
  } catch(e) {}
}

let db = { spots: [] };

async function loadFromSupabase() {
  showLoading(true, 'Loading your list...');
  // Timeout after 12 seconds - Supabase free tier can be slow to wake up
  const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 30000));
  try {
    const rows = await Promise.race([
      sbFetch('GET', 'spots?select=*&order=name.asc'),
      timeout
    ]);
    if (rows && rows.length > 0) {
      db.spots = rows;
    } else {
      showLoading(true, 'First run - seeding your list...');
      await seedBaseSpots();
      const seeded = await sbFetch('GET', 'spots?select=*&order=name.asc');
      db.spots = seeded || [];
    }
    showLoading(false);
    buildCatPills(); buildTypePills(); render();
    startRealtime();
  } catch(e) {
    console.error('Load error:', e);
    showLoading(false);
    // Show retry screen
    const msg = e.message === 'timeout'
      ? 'Taking too long - database may be waking up'
      : 'Connection error';
    document.getElementById('loadingBar').style.display = 'flex';
    document.getElementById('loadingBar').innerHTML = `
      <div style="text-align:center;padding:20px;">
        <div style="color:#e8b84b;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;margin-bottom:8px;">Our List</div>
        <div style="color:#7a776e;font-size:0.82rem;margin-bottom:20px;">${msg}</div>
        <button onclick="loadFromSupabase()" style="background:#e8b84b;color:#0f0e0d;border:none;padding:12px 28px;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Try again</button>
        <div style="color:#5a5750;font-size:0.74rem;margin-top:12px;">Supabase free tier sleeps after inactivity.<br>First load can take 10-20 seconds.</div>
      </div>`;
  }
}

async function seedBaseSpots() {
  const batch = 50;
  for (let i = 0; i < BASE.length; i += batch) {
    const chunk = BASE.slice(i, i + batch).map(s => ({
      name: s.name, cat: s.cat, cuisine: s.cuisine,
      location: s.location || '', note: s.note || '', link: s.link || '',
      stars: 0, fav: false, been: s.been || false, want: false, photo: '', collections: '', goback: null
    }));
    await sbFetch('POST', 'spots', chunk);
  }
}

function showLoading(on, msg) {
  const el = document.getElementById('loadingBar');
  if (!el) return;
  el.style.display = on ? 'flex' : 'none';
  if (msg) el.querySelector('span').textContent = msg;
}

function showStatus(msg, isError) {
  const el = document.getElementById('statusMsg');
  if (!el) return;
  el.textContent = msg;
  el.style.cssText = 'display:block;text-align:center;padding:6px;font-size:0.8rem;color:' + (isError ? '#e84b4b' : '#4caf78');
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function startRealtime() {
  // Poll every 8 seconds for changes from other users - simple and reliable
  setInterval(async () => {
    try {
      const rows = await sbFetch('GET', 'spots?select=id,fav,been,stars,link,lat,lng,goback&order=name.asc');
      if (!rows) return;
      let changed = false;
      rows.forEach(r => {
        const s = db.spots.find(x => x.id === r.id);
        if (s && (s.fav !== r.fav || s.been !== r.been || s.stars !== r.stars || s.link !== r.link)) {
          Object.assign(s, { fav: r.fav, been: r.been, stars: r.stars, link: r.link||'', lat: r.lat||null, lng: r.lng||null, goback: r.goback !== undefined ? r.goback : null });
          changed = true;
        }
      });
      if (changed) render();
    } catch(e) {}
  }, 8000);
}

let collapseThreshold = 100;
function measureThreshold() {
  const topRow = document.getElementById('topRow');
  const bar = document.getElementById('stickyBar');
  const barTop = bar.getBoundingClientRect().top + window.scrollY;
  const rowBottom = topRow.getBoundingClientRect().bottom + window.scrollY;
  collapseThreshold = Math.max(rowBottom - barTop + 10, 50);
}

let rafPending = false;
let lastY = 0;
let fullyCollapsed = false;
let tabsVisible = false;

function setCollapse(hideAll, hideTabs) {
  document.getElementById('favBar').classList.toggle('gone', hideAll);
  const topRow = document.getElementById('topRow');
  if (topRow) topRow.classList.toggle('gone', hideAll);
  document.getElementById('catRow').classList.toggle('gone', hideAll);

window.addEventListener('scroll', () => {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    const y = window.scrollY;
    const scrollingDown = y > lastY;
    lastY = y;

    if (y <= 10) {
      // At top - show everything
      if (fullyCollapsed || tabsVisible) {
        fullyCollapsed = false; tabsVisible = false;
        setCollapse(false, false);
      }
    } else if (scrollingDown && y > 50 && !fullyCollapsed) {
      // Scrolling down past 50px - collapse everything
      fullyCollapsed = true; tabsVisible = false;
      setCollapse(true, true);
    } else if (!scrollingDown && fullyCollapsed) {
      // Any upward pull - show tabs
      tabsVisible = true;
      setCollapse(true, false);
    }
  });
}, { passive: true });

function buildCatPills() {
  const row = document.getElementById('catRow');
  const topCats = CATS.filter(c => c.parent === null);
  const foodActive = activeCategory === 'food' || FOOD_SUBS.includes(activeCategory);

  const allBtn = `<button class="cat-pill${activeCategory==='all'?' active':''}" data-cat="all"
    style="border-color:${activeCategory==='all'?'var(--accent)':'#ffffff22'};${activeCategory==='all'?'background:var(--accent);color:#0f0e0d;font-weight:600;':''}">
    <span class="dot" style="background:var(--accent)"></span>All
  </button>`;

  const topPills = topCats.map(c => {
    const isActive = activeCategory === c.key || (c.key==='food' && foodActive);
    const hasSubs = c.key === 'food';
    const activeSub = hasSubs && foodActive && activeCategory !== 'food'
      ? ' · ' + catLabel(activeCategory) : '';
    return `<button class="cat-pill${isActive?' active':''}" data-cat="${c.key}"
      style="border-color:${isActive?c.color:c.color+'44'};${isActive?`background:${c.color};color:#0f0e0d;font-weight:600;`:`color:${c.color}cc;`}">
      <span class="dot" style="background:${c.color}"></span>${c.label}${activeSub}${hasSubs?' ▾':''}
    </button>`;
  }).join('');

  row.innerHTML = allBtn + topPills;

  row.onclick = e => {
    const btn = e.target.closest('.cat-pill');
    if (!btn) return;
    const newCat = btn.dataset.cat;
    closeAllDropdowns();
    if (newCat === 'food') {
      // Open sub-category dropdown instead of setting category directly
      openSubCatDropdown(btn);
      return;
    }
    activeCategory = newCat;
    activeCuisine = 'All';
    buildCatPills();
    buildTypePills();
    render();
  };
}

  const filtered = getRandomPool();

  const card = document.getElementById('randCard');
  card.classList.add('rand-spinning');
  let ticks = 0;
  const total = 12 + Math.floor(Math.random() * 8);
  const tick = () => {
    const s = filtered[Math.floor(Math.random() * filtered.length)];
    document.getElementById('randName').textContent = s.name;
    document.getElementById('randCat').textContent = catLabel(s.cat);
    document.getElementById('randNote').textContent = s.note || '';
    const locEl = document.getElementById('randLoc');
    if (s.location) {
      locEl.textContent = '📍 ' + s.location;
      locEl.style.textDecoration = (s.lat && s.lng) || s.location ? 'underline' : 'none';
      locEl.style.color = (s.lat && s.lng) || s.location ? 'var(--accent)' : 'var(--muted)';
    } else {
      locEl.textContent = '';
    }
    const color = catColor(s.cat);
    document.getElementById('randBefore').textContent = `.rand-card::before { background: ${color}; }`;
    ticks++;
    if (ticks < total) {
      setTimeout(tick, 60 + ticks * 15);
    } else {
      card.classList.remove('rand-spinning');
      _currentRandSpot = s; // store final spot for maps link
    }
  };
  tick();

function saveSpot() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { document.getElementById('mName').focus(); return; }
  const catInput = document.getElementById('mCategory').value.trim().toLowerCase();
  const subInput = document.getElementById('mSubCat').value.trim().toLowerCase();
  // If subcategory is filled, use that as the cat key (it's a food sub)
  // Otherwise use the category field directly
  let cat;
  if (subInput) {
    let existing = CATS.find(c => c.label.toLowerCase() === subInput && c.parent === 'food');
    if (existing) {
      cat = existing.key;
    } else {
      // New dynamic subcategory - create it on the fly
      const newKey = subInput.replace(/[^a-z0-9]/g, '');
      const newLabel = document.getElementById('mSubCat').value.trim();
      const EXTRA_COLORS = ['#e84b4b','#4be8b4','#e8784b','#784be8','#4bb4e8','#e8b44b','#b4e84b','#e84b78'];
      const usedColors = CATS.map(c => c.color);
      const newColor = EXTRA_COLORS.find(c => !usedColors.includes(c)) || '#aaaaaa';
      const newCat = { key: newKey, label: newLabel, color: newColor, parent: 'food' };
      CATS.push(newCat);
      FOOD_SUBS.push(newKey);
      CAT_MAP[newKey] = newCat;
      // Persist new categories to localStorage
      try { localStorage.setItem('our-list-cats', JSON.stringify(CATS.filter(c => c.parent === 'food' && !['brunch','italian','asian','latino','american','fusion','bars','coffee','dessert','carts','finedining','seafood','greek','african'].includes(c.key)))); } catch(e) {}
      cat = newKey;
    }
  } else {
    cat = CATS.find(c => c.label.toLowerCase() === catInput || c.key === catInput)?.key || 'other';
  }
  const cuisine     = document.getElementById('mCuisine').value.trim() || 'Other';
  const location    = document.getElementById('mLocation').value.trim();
  const lat         = parseFloat(document.getElementById('mLat').value) || null;
  const lng         = parseFloat(document.getElementById('mLng').value) || null;
  const note        = document.getElementById('mNote').value.trim();
  const link        = document.getElementById('mLink').value.trim();
  const photo       = document.getElementById('mPhoto').value.trim();
  const collections = document.getElementById('mCollections').value.trim();
  // Read ALL values before closing modal - closing can wipe DOM on iOS
  closeModal();
  if (editingId !== null) {
    const s = db.spots.find(x => x.id === editingId);
    if (s) {
      Object.assign(s, { name, cat, cuisine, location, note, link: link||'', photo: photo||'', collections: collections||'', stars: modalStars, lat: lat||null, lng: lng||null });
      render();
      sbFetch('PATCH', 'spots?id=eq.' + editingId, { name, cat, cuisine, location, note, link: link||'', photo: photo||'', collections: collections||'', stars: modalStars, lat: lat||null, lng: lng||null, goback: s.goback||null })
        .then(() => showStatus('Saved'))
        .catch(() => showStatus('Save failed', true));
    }
  } else {
    const newSpot = { name, cat, cuisine, location, note, link: link||'', photo: photo||'', collections: collections||'', stars: modalStars, fav: false, been: false, want: false, lat, lng, goback: null };
    sbFetch('POST', 'spots', newSpot)
      .then(res => {
        if (res && res[0]) { db.spots.push(res[0]); render(); }
        showStatus('Added');
        buildCatPills(); buildTypePills();
      })
      .catch(() => showStatus('Add failed', true));
  }
  setTimeout(measureThreshold, 150);
}

  const s = db.spots.find(x => x.id === id);
  if (!s) return;
  s.been = !s.been;
  if (s.been) {
    // Show popup asking go back or no thanks
    _beenPopupId = id;
    document.getElementById('beenPopupName').textContent = s.name;
    const bp = document.getElementById('beenPopup');
    bp.style.cssText = 'display:flex;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:20px;pointer-events:auto;';
  } else {
    s.goback = null;
    activeView = 'active';
    document.querySelectorAll('.view-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.view === 'active');
    });
  }
  render();
  sbFetch('PATCH', 'spots?id=eq.' + id, { been: s.been, goback: s.goback || null }).catch(() => {});
}

function cancelBeen() {
  // Undo the been mark entirely
  const bpEl2 = document.getElementById('beenPopup');
  bpEl2.style.display = 'none'; bpEl2.style.pointerEvents = 'none';
  if (_beenPopupId === null) return;
  const s = db.spots.find(x => x.id === _beenPopupId);
  if (s) {
    s.been = false;
    s.goback = null;
    activeView = 'active';
    document.querySelectorAll('.view-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.view === 'active');
    });
    render();
    sbFetch('PATCH', 'spots?id=eq.' + _beenPopupId, { been: false, goback: null }).catch(() => {});
  }
  _beenPopupId = null;
}

function undoBeen() {
  // X - accidental tap, revert been to false, close popup, stay on current list
  const bpEl2 = document.getElementById('beenPopup');
  bpEl2.style.display = 'none'; bpEl2.style.pointerEvents = 'none';
  if (_beenPopupId === null) return;
  const s = db.spots.find(x => x.id === _beenPopupId);
  if (s) {
    s.been = false;
    s.goback = null;
    render();
    sbFetch('PATCH', 'spots?id=eq.' + _beenPopupId, { been: false, goback: null }).catch(() => {});
  }
  _beenPopupId = null;
}

function setBeenDecision(goback) {
  const bpEl = document.getElementById('beenPopup');
  bpEl.style.display = 'none'; bpEl.style.pointerEvents = 'none';
  if (_beenPopupId === null) return;

// ---- RENDER ----
function getFilteredList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return db.spots.filter(s => {
    // VIEW FILTER
    if (activeView === 'archive') {
      if (!s.been || s.goback !== null) return false; // archive = been + no decision yet (decide later)
    } else if (activeView === 'repeats') {
      if (!s.been || s.goback !== true) return false;
    } else if (activeView === 'noback') {
      if (!s.been || s.goback !== false) return false;
    } else {
      if (s.been) return false; // active list = unvisited only
    }
    if (activeCategory !== 'all') {
      if (activeCategory === 'food') {
        if (!isFood(s.cat)) return false;
      } else if (s.cat !== activeCategory) return false;
    }
    if (activeCuisine !== 'All' && s.cuisine !== activeCuisine) return false;
    if (activeStar === 5 && (s.stars||0) !== 5) return false;
    if (activeStar > 0 && activeStar < 5 && (s.stars||0) < activeStar) return false;
    if (favOnly && !s.fav) return false;
    if (beenOnly && !s.been) return false;
    if (wantOnly && !s.want) return false;
    if (q) {
      const hay = `${s.name} ${s.cuisine} ${s.cat} ${s.note||''} ${s.location||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const sortVal = document.getElementById('sortSelect').value;
  const sort = sortVal.startsWith('view-') ? 'newest' : sortVal;
  let list = getFilteredList();
  if (sort==='newest')       list.sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
  else if (sort==='alpha')        list.sort((a,b)=>a.name.localeCompare(b.name));
  else if (sort==='alpha-desc') list.sort((a,b)=>b.name.localeCompare(a.name));
  else if (sort==='stars-desc') list.sort((a,b)=>(b.stars||0)-(a.stars||0)||a.name.localeCompare(b.name));
  else if (sort==='stars-asc')  list.sort((a,b)=>(a.stars||0)-(b.stars||0)||a.name.localeCompare(b.name));

  const favs = db.spots.filter(s=>s.fav).length;
  const beens = db.spots.filter(s=>s.been).length;
  document.getElementById('totalCount').textContent = `${db.spots.length} spots · ${beens} been · ${favs} ❤`;
  document.getElementById('countBar').textContent = `Showing ${list.length} spot${list.length!==1?'s':''}`;

  const grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div class="empty">No spots match that filter.</div>'; return; }

  grid.innerHTML = list.map(s => {
    const color = catColor(s.cat);
    const stars = [1,2,3,4,5].map(n =>
      `<span class="s${(s.stars||0)>=n?' lit':''}" data-action="star" data-id="${s.id}" data-n="${n}">★</span>`
    ).join('');
        const mapsUrl = s.lat && s.lng
      ? `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`
      : s.location
        ? `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(s.location)}`
        : null;
    const locText = s.location || '';
    const loc = locText
      ? `<div class="card-location">${mapsUrl
          ? `<a href="${mapsUrl}" target="_blank" rel="noopener"
              style="color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px;"
              onclick="event.stopPropagation()">📍 ${htmlText(locText)}</a>`
          : `📍 ${htmlText(locText)}`
        }</div>`
      : s.lat && s.lng
        ? `<div class="card-location"><a href="${mapsUrl}" target="_blank" rel="noopener"
            style="color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:4px;"
            onclick="event.stopPropagation()">📍 View on map</a></div>`
        : '';
    const note = s.note ? `<div class="card-note">${htmlText(s.note)}</div>` : '';
    const favStyle = s.fav ? 'opacity:1;color:#e84b4b' : 'opacity:0.3';
    const viewBadge = '';
    const photo = s.photo ? `<img class="card-photo" src="${htmlAttr(s.photo)}" alt="" loading="lazy" onerror="this.style.display='none'">` : '';
    const colls = s.collections ? s.collections.split(',').map(c => c.trim()).filter(Boolean).map(c => `<span class="coll-tag">${htmlText(c)}</span>`).join('') : '';
    return `
    <div class="card" data-cat="${s.cat}" style="--card-color:${color}; border-top: 3px solid ${color}22;">
      ${photo}
      <div class="card-top">
        <div class="card-name">${htmlText(s.name)}</div>
        <div class="card-actions">
          <button class="want-btn${s.want?' on':''}" data-action="want" data-id="${s.id}" title="Want to go">🔥</button>
          <button class="icon-btn" data-action="edit" data-id="${s.id}" title="Edit">✏️</button>
          <button class="icon-btn fav-btn-card${s.fav?' on':''}" data-action="fav" data-id="${s.id}" style="${favStyle}">♥</button>
        </div>
      </div>
      ${loc}${note}
      ${colls ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;">${colls}</div>` : ''}
      <div class="card-footer">
        <div class="card-stars">${stars}</div>
        <div class="card-badges">
          <span class="ctag" data-action="filter" data-cuisine="${htmlAttr(s.cuisine)}" style="border-color:${color}44;color:${color}">${htmlText(s.cuisine)}</span>
          <button class="been-btn${s.been?' on':''}" data-action="been" data-id="${s.id}">${s.been?'✓ Been':'Been?'}</button>
          ${s.been ? `
            <button class="goback-btn${s.goback===true?' yes':''}" data-action="goback-yes" data-id="${s.id}" title="Worth it">👍</button>
            <button class="goback-btn${s.goback===false?' no':''}" data-action="goback-no" data-id="${s.id}" title="Once was enough">✗</button>
          ` : ''}
          ${s.link ? `<a class="link-btn" href="${htmlAttr(s.link)}" target="_blank" rel="noopener" title="Open link">🔗</a>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- PLACE SEARCH + MINI MAP ----
let autocompleteService = null;
let placesService = null;

function initPlacesServices() {
  if (!window.google || autocompleteService) return;
  autocompleteService = new google.maps.places.AutocompleteService();
  placesService = new google.maps.places.PlacesService(document.createElement('div'));
}
let miniMapInstance = null;
let miniMapMarker = null;


async function searchPlace(query) {
  if (!query || query.length < 3) {
    document.getElementById('placeResults').style.display = 'none';
    return;
  }
  ensureMapsLoaded();
  if (!window.google) {
    // Maps not loaded yet - try again in 1 second
    setTimeout(() => searchPlace(query), 1000);
    return;
  }
  try {
    const { AutocompleteSuggestion } = await google.maps.importLibrary('places');
    const { suggestions } = await AutocompleteSuggestion.fetchAutocompleteSuggestions({
      input: query,
      locationBias: new google.maps.Circle({ center: { lat: 45.5051, lng: -122.6750 }, radius: 50000 }),
    });
    const res = document.getElementById('placeResults');
    if (!suggestions || !suggestions.length) { res.style.display = 'none'; return; }
    res.innerHTML = suggestions.slice(0,5).map(s => {
      const text = s.placePrediction.text.toString();
      const pid = s.placePrediction.placeId;
      return `<div onclick="selectPlace('${pid}','${text.replace(/'/g,"\'").replace(/"/g,'&quot;')}')"
        style="padding:10px 14px;cursor:pointer;font-size:0.84rem;color:var(--text);border-bottom:1px solid var(--border);"
        onmouseover="this.style.background='#2a2820'" onmouseout="this.style.background=''">${text}</div>`;
    }).join('');
    res.style.display = 'block';
  } catch(e) {
    console.warn('Search error:', e);
    document.getElementById('placeResults').style.display = 'none';
  }
}

async function selectPlace(placeId, description) {
  document.getElementById('placeResults').style.display = 'none';
  document.getElementById('mPlaceSearch').value = description;
  if (!window.google) return;
  try {
    const { Place } = await google.maps.importLibrary('places');
    const place = new Place({ id: placeId });
    await place.fetchFields({ fields: ['location','displayName','formattedAddress'] });
    const lat = place.location.lat();
    const lng = place.location.lng();
    setPinFromCoords(lat, lng, place.displayName);
    if (place.formattedAddress) {
      document.getElementById('mLocation').value = place.formattedAddress;
    }
  } catch(e) { console.warn('Place error:', e); }
}


function setPinFromCoords(lat, lng, name) {
  document.getElementById('mLat').value = lat;
  document.getElementById('mLng').value = lng;
  document.getElementById('pinStatus').style.display = 'block';
  document.getElementById('miniMapWrap').style.display = 'block';

  if (!window.google) return;
  initPlacesServices();

  const mapDiv = document.getElementById('miniMap');
  const pos = { lat: parseFloat(lat), lng: parseFloat(lng) };

  if (!miniMapInstance) {
    miniMapInstance = new google.maps.Map(mapDiv, {
      zoom: 15, center: pos,
      styles: [
        {elementType:'geometry',stylers:[{color:'#1a1916'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#f0ede6'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#2e2c28'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1b2a'}]},
        {featureType:'poi',stylers:[{visibility:'off'}]},
      ],
      mapTypeControl:false, streetViewControl:false, fullscreenControl:false, zoomControl:false
    });
  } else {
    miniMapInstance.setCenter(pos);
  }

  if (miniMapMarker) miniMapMarker.setMap(null);
  miniMapMarker = new google.maps.Marker({
    position: pos, map: miniMapInstance, draggable: true, title: name,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10,
      fillColor: '#e8b84b', fillOpacity: 1, strokeColor: '#0f0e0d', strokeWeight: 2 }
  });

  // Update coords if pin is dragged
  miniMapMarker.addListener('dragend', () => {
    const p = miniMapMarker.getPosition();
    document.getElementById('mLat').value = p.lat();
    document.getElementById('mLng').value = p.lng();
  });
}

function clearPin() {
  try {
    const ids = ['mLat','mLng','mPlaceSearch'];
    ids.forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    ['pinStatus','miniMapWrap','placeResults'].forEach(id => {
      const el = document.getElementById(id); if(el) el.style.display = 'none';
    });
    if (miniMapMarker) { try { miniMapMarker.setMap(null); } catch(e){} miniMapMarker = null; }
    miniMapInstance = null;
  } catch(e) { console.warn('clearPin:', e); }
}

// ---- PHOTO UPLOAD + CROP ----
let _cropImg = null;   // the loaded Image object
let _cropSrc = '';     // base64 data URL
let _cropFile = null;
let _cx = 0, _cy = 0, _cScale = 1;
let _dragging = false, _lastX = 0, _lastY = 0;

function handlePhotoCrop(input) {
  const file = input.files[0];
  if (!file) return;
  _cropFile = file;
  input.value = '';

  const reader = new FileReader();
  reader.onload = e => {
    _cropSrc = e.target.result;
    const img = new Image();
    img.onload = () => {
      _cropImg = img;
      // Fill frame completely (no black bars) - centered so you can drag to reposition
      const frame = document.getElementById('cropFrame');
      const fw = frame.offsetWidth || 300;
      const fh = 150;
      _cScale = Math.max(fw / img.width, fh / img.height);
      // Center the image
      _cx = (fw - img.width * _cScale) / 2;
      _cy = (fh - img.height * _cScale) / 2;
      // Set slider to match initial fill scale
      setTimeout(() => {
        const slider = document.getElementById('zoomSlider');
        if (slider) {
          const minS = Math.min(fw / img.width, fh / img.height);
          const fillS = Math.max(fw / img.width, fh / img.height);
          const maxS = fillS * 3;
          slider.value = Math.round(((fillS - minS) / (maxS - minS)) * 100);
        }
      }, 50);

      // Show the img element
      const cropImgEl = document.getElementById('cropImg');
      cropImgEl.src = _cropSrc;
      cropImgEl.style.width = (img.width * _cScale) + 'px';
      cropImgEl.style.height = (img.height * _cScale) + 'px';
      cropImgEl.style.transform = `translate(${_cx}px, ${_cy}px)`;

      document.getElementById('cropWrap').style.display = 'block';
      document.getElementById('photoUploadBtn').style.display = 'none';
      document.getElementById('photoPreviewWrap').style.display = 'none';
      drawPreview();
      attachCropEvents();
    };
    img.src = _cropSrc;
  };
  reader.readAsDataURL(file);
}

function attachCropEvents() {
  const frame = document.getElementById('cropFrame');
  // Remove old listeners by cloning
  const newFrame = frame.cloneNode(true);
  frame.parentNode.replaceChild(newFrame, frame);
  // Re-attach img ref
  document.getElementById('cropImg').src = _cropSrc;
  updateCropImgStyle();

  // Touch
  let _pinchDist = 0;

  newFrame.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      _dragging = true;
      _lastX = e.touches[0].clientX;
      _lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      _dragging = false;
      _pinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });

  newFrame.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && _dragging) {
      const dx = e.touches[0].clientX - _lastX;
      const dy = e.touches[0].clientY - _lastY;
      _lastX = e.touches[0].clientX;
      _lastY = e.touches[0].clientY;
      moveCrop(dx, dy);
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (_pinchDist > 0) {
        zoomCrop(dist / _pinchDist);
      }
      _pinchDist = dist;
    }
  }, { passive: false });

  newFrame.addEventListener('touchend', e => {
    _pinchDist = 0;
    // If one finger still on screen after pinch, prep for drag immediately
    if (e.touches.length === 1) {
      _dragging = true;
      _lastX = e.touches[0].clientX;
      _lastY = e.touches[0].clientY;
    } else {
      _dragging = false;
    }
  });

  // Mouse
  newFrame.addEventListener('mousedown', e => {
    _dragging = true; _lastX = e.clientX; _lastY = e.clientY;
    newFrame.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!_dragging) return;
    moveCrop(e.clientX - _lastX, e.clientY - _lastY);
    _lastX = e.clientX; _lastY = e.clientY;
  });
  document.addEventListener('mouseup', () => {
    _dragging = false;
    const f = document.getElementById('cropFrame');
    if (f) f.style.cursor = 'grab';
  });
}

function moveCrop(dx, dy) {
  if (!_cropImg) return;
  const frame = document.getElementById('cropFrame');
  const fw = frame.offsetWidth, fh = 150;
  const iw = _cropImg.width * _cScale, ih = _cropImg.height * _cScale;
  // When image smaller than frame allow free movement, when larger clamp to edges
  _cx = iw >= fw ? Math.min(0, Math.max(fw - iw, _cx + dx)) : Math.max(0, Math.min(fw - iw, _cx + dx));
  _cy = ih >= fh ? Math.min(0, Math.max(fh - ih, _cy + dy)) : Math.max(0, Math.min(fh - ih, _cy + dy));
  updateCropImgStyle();
  drawPreview();
}

function zoomCrop(ratio) {
  if (!_cropImg) return;
  const frame = document.getElementById('cropFrame');
  const fw = frame.offsetWidth, fh = 150;
  const minScale = Math.min(fw / _cropImg.width, fh / _cropImg.height); // allow full zoom out to see whole image
  const newScale = Math.max(minScale, Math.min(_cScale * ratio, minScale * 4));
  // Zoom toward center of frame
  const centerX = fw / 2, centerY = fh / 2;
  _cx = centerX - (centerX - _cx) * (newScale / _cScale);
  _cy = centerY - (centerY - _cy) * (newScale / _cScale);
  _cScale = newScale;
  // Clamp after zoom
  const iw = _cropImg.width * _cScale, ih = _cropImg.height * _cScale;
  _cx = Math.min(0, Math.max(fw - iw, _cx));
  _cy = Math.min(0, Math.max(fh - ih, _cy));
  updateCropImgStyle();
  drawPreview();
  // Sync slider position to current scale
  const slider = document.getElementById('zoomSlider');
  if (slider && _cropImg) {
    const minS = Math.min(fw / _cropImg.width, fh / _cropImg.height);
    const fillS = Math.max(fw / _cropImg.width, fh / _cropImg.height);
    const maxS = fillS * 3;
    slider.value = Math.round(Math.max(0, Math.min(100, ((_cScale - minS) / (maxS - minS)) * 100)));
  }
}

function updateCropImgStyle() {
  const el = document.getElementById('cropImg');
  if (!el || !_cropImg) return;
  el.style.width  = (_cropImg.width  * _cScale) + 'px';
  el.style.height = (_cropImg.height * _cScale) + 'px';
  el.style.transform = `translate(${_cx}px, ${_cy}px)`;
}

function drawPreview() {
  if (!_cropImg) return;
  const canvas = document.getElementById('cropPreviewCanvas');
  if (!canvas) return;
  const frame = document.getElementById('cropFrame');
  const fw = frame.offsetWidth || 300;
  const fh = 150;
  canvas.width  = fw * 2;
  canvas.height = fh * 2;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Source: what's visible in the crop frame mapped back to original image coords
  const srcX = -_cx / _cScale;
  const srcY = -_cy / _cScale;
  const srcW =  fw  / _cScale;
  const srcH =  fh  / _cScale;
  ctx.drawImage(_cropImg, srcX, srcY, srcW, srcH, 0, 0, canvas.width, canvas.height);
}

function sliderZoom(val) {
  if (!_cropImg) return;
  const frame = document.getElementById('cropFrame');
  const fw = frame.offsetWidth, fh = 150;
  const minScale = Math.min(fw / _cropImg.width, fh / _cropImg.height); // fully zoomed out
  const fillScale = Math.max(fw / _cropImg.width, fh / _cropImg.height); // fills frame
  const maxScale = fillScale * 3; // max zoom
  // Slider 0 = fully out, 50 = fills frame, 100 = max zoom
  const t = val / 100;
  const targetScale = minScale + t * (maxScale - minScale);
  zoomCrop(targetScale / _cScale);
}

function cancelCrop() {
  _cropFile = null; _cropImg = null;
  document.getElementById('cropWrap').style.display = 'none';
  document.getElementById('photoUploadBtn').style.display = 'flex';
}

async function confirmCrop() {
  if (!_cropImg) return;
  const btn = document.getElementById('confirmCropBtn');
  btn.textContent = 'Uploading...'; btn.style.opacity = '0.6';

  try {
    const frame = document.getElementById('cropFrame');
    const fw = frame.offsetWidth || 300;
    const fh = 150;
    const canvas = document.createElement('canvas');
    canvas.width = fw * 2; canvas.height = fh * 2;
    const ctx = canvas.getContext('2d');
    const srcX = -_cx / _cScale;
    const srcY = -_cy / _cScale;
    const srcW =  fw  / _cScale;
    const srcH =  fh  / _cScale;
    ctx.drawImage(_cropImg, srcX, srcY, srcW, srcH, 0, 0, canvas.width, canvas.height);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.88));
    const filename = 'photo-' + Date.now() + '.jpg';

    const res = await fetch(SUPABASE_URL + '/storage/v1/object/spot-photos/' + filename, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'image/jpeg',
        'x-upsert': 'true'
      },
      body: blob
    });

    if (!res.ok) throw new Error(await res.text());

    const publicUrl = SUPABASE_URL + '/storage/v1/object/public/spot-photos/' + filename;
    document.getElementById('mPhoto').value = publicUrl;
    document.getElementById('cropWrap').style.display = 'none';
    showPhotoPreview(publicUrl);
    const status = document.getElementById('photoUploadStatus');
    status.style.display = 'block';
    status.textContent = '✓ Photo saved';
    status.style.color = '#4caf78';
  } catch(e) {
    console.error(e);
    const status = document.getElementById('photoUploadStatus');
    status.style.display = 'block';
    status.textContent = 'Upload failed - try again';
    status.style.color = '#e84b4b';
  }
  btn.textContent = 'Use photo'; btn.style.opacity = '1';
  _cropFile = null; _cropImg = null;
}

function compressImage(file, maxWidth, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = h * maxWidth / w; w = maxWidth; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(resolve, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function openMapView() {

function renderMapSpotList(pinned, unpinned) {
  const list = document.getElementById('mapSpotList');
  let html = '';

  if (pinned.length) {
    html += `<div style="padding:8px 16px 4px;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">📍 Pinned (${pinned.length})</div>`;
    html += pinned.map((s,i) => `
      <div class="map-spot-item" onclick="focusMarker(${i})">
        <span class="dot" style="background:${catColor(s.cat)}"></span>
        <div>
          <div class="spot-name">${htmlText(s.name)}</div>
          <div class="spot-loc">${htmlText(s.location||'')}</div>
        </div>
      </div>`).join('');
  }

  if (unpinned.length) {
    html += `<div style="padding:8px 16px 4px;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;border-top:1px solid var(--border);">Not pinned yet (${unpinned.length}) - edit to add location</div>`;
    html += unpinned.map(s => `
      <div class="map-spot-item" style="opacity:0.45;">
        <span class="dot" style="background:${catColor(s.cat)}"></span>
        <div>
          <div class="spot-name">${htmlText(s.name)}</div>
          <div class="spot-loc">${s.location ? htmlText(s.location) : 'No location set'}</div>
        </div>
      </div>`).join('');
  }

  if (!pinned.length && !unpinned.length) {
    html = '<div style="padding:20px;color:var(--muted);font-size:0.84rem;text-align:center;">No spots in this filter</div>';
  }

}

function initMap(spots) {
  const container = document.getElementById('mapContainer');
  if (MAPS_KEY === 'YOUR_GOOGLE_MAPS_KEY') {
    container.innerHTML = `
      <div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:30px;text-align:center;">
        <div style="font-size:3rem;">🗺️</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--accent);">Map coming soon</div>
        <div style="color:var(--muted);font-size:0.84rem;line-height:1.6;">Add your Google Maps API key to enable.<br>Pin spots via the edit modal to show them here.</div>
      </div>`;
    return;
  }
  if (!window.google) {
    const script = document.createElement('script');
    script.src = 'https://maps.googleapis.com/maps/api/js?key=' + MAPS_KEY + '&libraries=places,marker&loading=async&callback=_mapLoaded';
    script.async = true;
    window._mapPendingSpots = spots;
    document.head.appendChild(script);
    return;
  }
  _renderGoogleMap(spots);
}

window._mapLoaded = function() {
  // Init places services immediately so edit modal search works
  initPlacesServices();
  if (window._mapPendingSpots) _renderGoogleMap(window._mapPendingSpots);
};

function _renderGoogleMap(spots) {
  mapMarkers = [];
  const container = document.getElementById('mapContainer');

  // Only show spots with pinned coordinates
  const pinned = spots.filter(s => s.lat && s.lng);
  const unpinned = spots.filter(s => !s.lat || !s.lng);

  const map = new google.maps.Map(container, {
    zoom: pinned.length ? 12 : 11,
    center: pinned.length
      ? { lat: pinned[0].lat, lng: pinned[0].lng }
      : { lat: 45.5051, lng: -122.6750 },
    styles: [
      {elementType:'geometry',stylers:[{color:'#1a1916'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#f0ede6'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#0f0e0d'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2e2c28'}]},
      {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#7a776e'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1b2a'}]},
      {featureType:'poi',stylers:[{visibility:'off'}]},
      {featureType:'transit',stylers:[{visibility:'off'}]},
    ],
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
  });
  mapInstance = map;

  if (pinned.length === 0) {
    // Show message overlay on map
    const div = document.createElement('div');
    div.style.cssText = 'position:absolute;bottom:0;left:0;right:0;background:rgba(15,14,13,0.88);padding:14px 18px;text-align:center;font-size:0.82rem;color:#7a776e;';
    div.innerHTML = 'Pin spots by searching their location in the edit modal to show them here.';
    container.style.position = 'relative';
    container.appendChild(div);
  }

  // Fit map to all pinned spots
  if (pinned.length > 1) {
    const bounds = new google.maps.LatLngBounds();
    pinned.forEach(s => bounds.extend({ lat: s.lat, lng: s.lng }));
    map.fitBounds(bounds, { top: 40, right: 40, bottom: 40, left: 40 });
  }

  pinned.forEach((s, i) => {
    const marker = new google.maps.Marker({
      position: { lat: s.lat, lng: s.lng },
      map, title: s.name,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 9,
        fillColor: catColor(s.cat),
        fillOpacity: 1,
        strokeColor: '#0f0e0d',
        strokeWeight: 2
      }
    });
    const infoContent = `
      <div style="background:#1a1916;padding:10px 12px;border-radius:8px;color:#f0ede6;font-family:'DM Sans',sans-serif;max-width:200px;">
        <div style="font-weight:500;font-size:0.92rem;margin-bottom:3px;">${s.name}</div>
        ${s.location ? `<div style="font-size:0.76rem;color:#7a776e;margin-bottom:3px;">📍 ${s.location}</div>` : ''}
        ${s.note ? `<div style="font-size:0.78rem;margin-bottom:4px;">${s.note}</div>` : ''}
        ${s.link ? `<a href="${s.link}" target="_blank" style="font-size:0.74rem;color:#e8b84b;">Open link 🔗</a>` : ''}
      </div>`;
    const info = new google.maps.InfoWindow({ content: infoContent });
    marker.addListener('click', () => {
      mapMarkers.forEach(m => m && m.info.close());
      info.open(map, marker);
    });
    mapMarkers[i] = { marker, info };
  });

  // Update spot list to show pinned vs unpinned
  renderMapSpotList(pinned, unpinned);
}

function focusMarker(i) {
  if (!mapInstance || !mapMarkers[i]) return;
  const { marker, info } = mapMarkers[i];
  mapInstance.panTo(marker.getPosition());
  mapInstance.setZoom(15);
  info.open(mapInstance, marker);
}

});

function updateSubCatVisibility(catValue) {

  const subField = document.getElementById('subCatField');
  subField.style.display = isFood ? '' : 'none';
  if (!isFood) document.getElementById('mSubCat').value = '';

function acShow(input, type) {
  const q = input.value.toLowerCase().trim();
  const listId = { topcategory:'acCategory', subcategory:'acSubCat', cuisine:'acCuisine', location:'acLocation', collections:'acCollections' }[type];
  const list = document.getElementById(listId);
  if (!list) return;
  let opts = type==='cuisine'
    ? Array.from(new Set(db.spots.map(s=>s.cuisine))).sort()
    : AC_OPTS[type];

  const matches = q ? opts.filter(o => o.toLowerCase().includes(q)) : [];
  const rest    = q ? opts.filter(o => !o.toLowerCase().includes(q)) : opts;
  const sorted  = [...matches, ...rest];

  if (!sorted.length) { list.classList.remove('open'); return; }
  list.innerHTML = sorted.map(o => {
    const safe = htmlAttr(o);
    const hi = q && o.toLowerCase().includes(q);
    return `<div class="ac-item${hi?' highlighted':''}" data-val="${safe}">${htmlText(o)}</div>`;
  }).join('');
  list.classList.add('open');
  list._inputRef = input;
}

function acBlur() {
  setTimeout(() => {
    const focused = document.activeElement;
    if (!focused || !focused.closest('.ac-wrap')) {
      document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
    }
  }, 200);
}

// touch tracking
let _ty = 0, _tx = 0, _moved = false;
document.addEventListener('touchstart', e => { _ty=e.touches[0].clientY; _tx=e.touches[0].clientX; _moved=false; }, {passive:true});
document.addEventListener('touchmove', e => { if(Math.abs(e.touches[0].clientY-_ty)>8||Math.abs(e.touches[0].clientX-_tx)>8) _moved=true; }, {passive:true});
document.addEventListener('touchend', e => {
  if (_moved) return;
  const item = e.target.closest('.ac-item');
  if (item) {
    e.preventDefault();
    const list = item.closest('.ac-list');
    const inp = list?._inputRef;
    if (inp) { inp.value = item.dataset.val; inp.dispatchEvent(new Event('input')); }
    document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
    return;
  }
  if (!e.target.closest('.ac-wrap')) document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
}, {passive:false});
document.addEventListener('mousedown', e => {
  const item = e.target.closest('.ac-item');
  if (item) {
    e.preventDefault();
    const list = item.closest('.ac-list');
    const inp = list?._inputRef;
    if (inp) inp.value = item.dataset.val;
    document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
    return;
  }
  if (!e.target.closest('.ac-wrap')) document.querySelectorAll('.ac-list').forEach(l => l.classList.remove('open'));
});
